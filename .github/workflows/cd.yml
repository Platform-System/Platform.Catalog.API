name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  call-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    uses: Platform-System/Platform.CI-CD/.github/workflows/reusable-dotnet-deploy.yml@main
    with:
      service_name: platform-catalog-api
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
